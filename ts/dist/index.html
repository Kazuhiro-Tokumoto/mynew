<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ECDSA bench</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #090909;
      --sur: #111;
      --bor: #1e1e1e;
      --acc: #00ff88;
      --warn: #ff6b35;
      --blue: #4f9eff;
      --text: #e0e0e0;
      --muted: #444;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Syne', sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100vh; padding: 40px 28px; max-width: 900px; margin: 0 auto; }
    h1 { font-family: var(--sans); font-size: 2rem; color: var(--acc); margin-bottom: 6px; }
    .sub { font-size: 0.72rem; color: var(--muted); margin-bottom: 32px; }
    .status { display: flex; gap: 10px; align-items: center; font-size: 0.72rem; color: var(--muted); margin-bottom: 28px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
    .dot.ok { background: var(--acc); box-shadow: 0 0 6px var(--acc); }
    .dot.loading { background: var(--warn); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

    .controls { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 28px; align-items: center; }
    select, input { background: var(--sur); border: 1px solid var(--bor); color: var(--text); font-family: var(--mono); font-size: 0.78rem; padding: 9px 13px; border-radius: 4px; outline: none; }
    input { flex: 1; min-width: 180px; }
    select:focus, input:focus { border-color: var(--acc); }
    button { font-family: var(--mono); font-size: 0.78rem; font-weight: 600; padding: 9px 18px; border-radius: 4px; border: none; cursor: pointer; transition: all 0.15s; }
    .btn-p { background: var(--acc); color: #000; }
    .btn-p:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-p:disabled { background: var(--muted); color: #222; cursor: not-allowed; transform: none; }
    .btn-g { background: transparent; border: 1px solid var(--bor); color: var(--muted); }
    .btn-g:hover { border-color: var(--muted); color: var(--text); }

    /* 3列比較テーブル */
    .bench-grid { display: grid; grid-template-columns: 140px 1fr 1fr 1fr; gap: 1px; background: var(--bor); border-radius: 8px; overflow: hidden; margin-bottom: 24px; }
    .cell { background: var(--sur); padding: 12px 14px; font-size: 0.72rem; }
    .cell.header { color: var(--muted); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; background: #0d0d0d; }
    .cell.label { color: var(--muted); }
    .col-ts { border-top: 2px solid var(--warn); }
    .col-wasm { border-top: 2px solid var(--acc); }
    .col-wc { border-top: 2px solid var(--blue); }
    .val { font-size: 0.95rem; font-weight: 600; color: var(--text); }
    .val.best { color: var(--acc); }
    .running .val { color: var(--warn); animation: pulse 0.8s infinite; }

    .ratio-bar { margin-bottom: 28px; }
    .ratio-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; font-size: 0.72rem; }
    .ratio-label { width: 80px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .bar-wrap { flex: 1; height: 6px; background: var(--bor); border-radius: 3px; overflow: hidden; }
    .bar { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
    .bar.ts { background: var(--warn); }
    .bar.wasm { background: var(--acc); }
    .bar.wc { background: var(--blue); }
    .ratio-num { width: 70px; text-align: right; color: var(--text); }

    .log { background: var(--sur); border: 1px solid var(--bor); border-radius: 6px; padding: 16px; font-size: 0.68rem; line-height: 2; max-height: 260px; overflow-y: auto; }
    .le { display: flex; gap: 10px; }
    .lt { color: var(--bor); flex-shrink: 0; }
    .ll { flex-shrink: 0; min-width: 70px; }
    .ll.ts { color: var(--warn); }
    .ll.wasm { color: var(--acc); }
    .ll.wc { color: var(--blue); }
    .ll.sys { color: var(--muted); }
    .lm { word-break: break-all; }
    .le.err .lm { color: var(--warn); }
  </style>
</head>
<body>
  <h1>ECDSA P-256 bench</h1>
  <p class="sub">自作TS vs Go wasm vs WebCrypto — 3-way comparison</p>

  <div class="status">
    <div class="dot" id="dot-wasm"></div><span id="st-wasm">wasm loading...</span>
    &nbsp;|&nbsp;
    <div class="dot" id="dot-wc"></div><span id="st-wc">WebCrypto ready</span>
  </div>

  <div class="controls">
    <select id="iter">
      <option value="100">100 回</option>
      <option value="500" selected>500 回</option>
      <option value="1000">1000 回</option>
    </select>
    <input id="msg" value="Hello, ECDSA benchmark!" />
    <button class="btn-p" id="run" disabled>▶ RUN</button>
    <button class="btn-g" id="clear">CLEAR</button>
  </div>

  <div class="bench-grid" id="grid">
    <div class="cell header"></div>
    <div class="cell header col-ts">自作 TS</div>
    <div class="cell header col-wasm">Go wasm</div>
    <div class="cell header col-wc">WebCrypto</div>

    <div class="cell label">sign median</div>
    <div class="cell" id="ts-sm"><span class="val">—</span></div>
    <div class="cell" id="wasm-sm"><span class="val">—</span></div>
    <div class="cell" id="wc-sm"><span class="val">—</span></div>

    <div class="cell label">sign mean</div>
    <div class="cell" id="ts-smn"><span class="val">—</span></div>
    <div class="cell" id="wasm-smn"><span class="val">—</span></div>
    <div class="cell" id="wc-smn"><span class="val">—</span></div>

    <div class="cell label">sign p99</div>
    <div class="cell" id="ts-s99"><span class="val">—</span></div>
    <div class="cell" id="wasm-s99"><span class="val">—</span></div>
    <div class="cell" id="wc-s99"><span class="val">—</span></div>

    <div class="cell label">verify median</div>
    <div class="cell" id="ts-vm"><span class="val">—</span></div>
    <div class="cell" id="wasm-vm"><span class="val">—</span></div>
    <div class="cell" id="wc-vm"><span class="val">—</span></div>

    <div class="cell label">verify mean</div>
    <div class="cell" id="ts-vmn"><span class="val">—</span></div>
    <div class="cell" id="wasm-vmn"><span class="val">—</span></div>
    <div class="cell" id="wc-vmn"><span class="val">—</span></div>

    <div class="cell label">verify p99</div>
    <div class="cell" id="ts-v99"><span class="val">—</span></div>
    <div class="cell" id="wasm-v99"><span class="val">—</span></div>
    <div class="cell" id="wc-v99"><span class="val">—</span></div>
  </div>

  <div class="ratio-bar" id="ratio-bar" style="display:none">
    <div class="ratio-row">
      <span class="ratio-label">sign</span>
      <div class="bar-wrap"><div class="bar ts" id="rb-ts-s" style="width:0%"></div></div>
      <span class="ratio-num" id="rn-ts-s">—</span>
      <div class="bar-wrap"><div class="bar wasm" id="rb-wasm-s" style="width:0%"></div></div>
      <span class="ratio-num" id="rn-wasm-s">—</span>
      <div class="bar-wrap"><div class="bar wc" id="rb-wc-s" style="width:0%"></div></div>
      <span class="ratio-num" id="rn-wc-s">—</span>
    </div>
    <div class="ratio-row">
      <span class="ratio-label">verify</span>
      <div class="bar-wrap"><div class="bar ts" id="rb-ts-v" style="width:0%"></div></div>
      <span class="ratio-num" id="rn-ts-v">—</span>
      <div class="bar-wrap"><div class="bar wasm" id="rb-wasm-v" style="width:0%"></div></div>
      <span class="ratio-num" id="rn-wasm-v">—</span>
      <div class="bar-wrap"><div class="bar wc" id="rb-wc-v" style="width:0%"></div></div>
      <span class="ratio-num" id="rn-wc-v">—</span>
    </div>
  </div>

  <div class="log" id="log"></div>

  <script src="wasm_exec.js"></script>
  <script type="module">
    import { PointPairSchnorrP256 } from "./ecdsa.js";

    const logEl = document.getElementById("log");
    const runBtn = document.getElementById("run");

    function log(label, msg, cls = "sys") {
      const ts = new Date().toISOString().slice(11, 23);
      const e = document.createElement("div");
      e.className = "le" + (cls === "err" ? " err" : "");
      e.innerHTML = `<span class="lt">${ts}</span><span class="ll ${cls}">${label}</span><span class="lm">${msg}</span>`;
      logEl.appendChild(e);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function stats(samples) {
      const s = [...samples].sort((a, b) => a - b);
      const n = s.length;
      const mean = samples.reduce((a, b) => a + b, 0) / n;
      const pct = p => s[Math.max(0, Math.min(n - 1, Math.ceil(p / 100 * n) - 1))];
      return { median: pct(50), mean, p99: pct(99) };
    }

    function setCell(id, val, best = false) {
      const el = document.getElementById(id);
      el.innerHTML = `<span class="val${best ? " best" : ""}">${val.toFixed(3)}ms</span>`;
    }

    function setRunning(id) {
      document.getElementById(id).innerHTML = `<span class="val running">...</span>`;
    }

    // wasm init
    const dotWasm = document.getElementById("dot-wasm");
    const stWasm = document.getElementById("st-wasm");
    dotWasm.className = "dot loading";
    let wasmReady = false;

    try {
      const go = new Go();
      const res = await WebAssembly.instantiateStreaming(fetch("ecdsa.wasm"), go.importObject);
      go.run(res.instance);
      wasmReady = true;
      dotWasm.className = "dot ok";
      stWasm.textContent = "wasm ready";
      log("init", "Go wasm loaded", "wasm");
    } catch (e) {
      dotWasm.className = "dot";
      stWasm.textContent = "wasm failed";
      log("error", e.message, "err");
    }

    document.getElementById("dot-wc").className = "dot ok";
    log("init", "WebCrypto available", "wc");

    runBtn.disabled = false;

    document.getElementById("clear").addEventListener("click", () => {
      logEl.innerHTML = "";
      ["ts-sm","ts-smn","ts-s99","ts-vm","ts-vmn","ts-v99",
       "wasm-sm","wasm-smn","wasm-s99","wasm-vm","wasm-vmn","wasm-v99",
       "wc-sm","wc-smn","wc-s99","wc-vm","wc-vmn","wc-v99"].forEach(id => {
        document.getElementById(id).innerHTML = `<span class="val">—</span>`;
      });
      document.getElementById("ratio-bar").style.display = "none";
    });

    runBtn.addEventListener("click", async () => {
      runBtn.disabled = true;
      const N = parseInt(document.getElementById("iter").value);
      const msg = document.getElementById("msg").value;
      const msgBytes = new TextEncoder().encode(msg);

      log("run", `n=${N} msg="${msg}"`, "sys");

      // ── 自作TS ──
      log("start", `署名×${N}`, "ts");
      ["ts-sm","ts-smn","ts-s99","ts-vm","ts-vmn","ts-v99"].forEach(setRunning);
      await new Promise(r => setTimeout(r, 10));

      const tsLib = new PointPairSchnorrP256();
      const { privateKey: tsPriv, publicKey: tsPub } = tsLib.generateKeyPair();
      const tsSig = tsLib.sign(msgBytes, tsPriv);

      const tsSignT = [], tsVerifyT = [];
      for (let i = 0; i < N; i++) {
        const t = performance.now(); tsLib.sign(msgBytes, tsPriv); tsSignT.push(performance.now() - t);
      }
      for (let i = 0; i < N; i++) {
        const t = performance.now(); tsLib.verify(msgBytes, tsPub, tsSig); tsVerifyT.push(performance.now() - t);
      }
      const tsS = stats(tsSignT), tsV = stats(tsVerifyT);
      setCell("ts-sm", tsS.median); setCell("ts-smn", tsS.mean); setCell("ts-s99", tsS.p99);
      setCell("ts-vm", tsV.median); setCell("ts-vmn", tsV.mean); setCell("ts-v99", tsV.p99);
      log("done", `sign median=${tsS.median.toFixed(3)}ms  verify median=${tsV.median.toFixed(3)}ms`, "ts");

      // ── Go wasm ──
      if (wasmReady) {
        log("start", `署名×${N}`, "wasm");
        ["wasm-sm","wasm-smn","wasm-s99","wasm-vm","wasm-vmn","wasm-v99"].forEach(setRunning);
        await new Promise(r => setTimeout(r, 10));

        const wKeys = window.ecdsaGenerateKey();
        const wSig = window.ecdsaSign(wKeys.privateKey, msg);

        const wasmSignT = [], wasmVerifyT = [];
        for (let i = 0; i < N; i++) {
          const t = performance.now(); window.ecdsaSign(wKeys.privateKey, msg); wasmSignT.push(performance.now() - t);
        }
        for (let i = 0; i < N; i++) {
          const t = performance.now(); window.ecdsaVerify(wKeys.publicKey, msg, wSig.result); wasmVerifyT.push(performance.now() - t);
        }
        const wasmS = stats(wasmSignT), wasmV = stats(wasmVerifyT);
        setCell("wasm-sm", wasmS.median); setCell("wasm-smn", wasmS.mean); setCell("wasm-s99", wasmS.p99);
        setCell("wasm-vm", wasmV.median); setCell("wasm-vmn", wasmV.mean); setCell("wasm-v99", wasmV.p99);
        log("done", `sign median=${wasmS.median.toFixed(3)}ms  verify median=${wasmV.median.toFixed(3)}ms`, "wasm");
      }

      // ── WebCrypto ──
      log("start", `署名×${N}`, "wc");
      ["wc-sm","wc-smn","wc-s99","wc-vm","wc-vmn","wc-v99"].forEach(setRunning);
      await new Promise(r => setTimeout(r, 10));

      const wcKey = await crypto.subtle.generateKey({ name: "ECDSA", namedCurve: "P-256" }, true, ["sign", "verify"]);
      const wcSig = await crypto.subtle.sign({ name: "ECDSA", hash: "SHA-256" }, wcKey.privateKey, msgBytes);

      const wcSignT = [], wcVerifyT = [];
      for (let i = 0; i < N; i++) {
        const t = performance.now();
        await crypto.subtle.sign({ name: "ECDSA", hash: "SHA-256" }, wcKey.privateKey, msgBytes);
        wcSignT.push(performance.now() - t);
      }
      for (let i = 0; i < N; i++) {
        const t = performance.now();
        await crypto.subtle.verify({ name: "ECDSA", hash: "SHA-256" }, wcKey.publicKey, wcSig, msgBytes);
        wcVerifyT.push(performance.now() - t);
      }
      const wcS = stats(wcSignT), wcV = stats(wcVerifyT);
      setCell("wc-sm", wcS.median); setCell("wc-smn", wcS.mean); setCell("wc-s99", wcS.p99);
      setCell("wc-vm", wcV.median); setCell("wc-vmn", wcV.mean); setCell("wc-v99", wcV.p99);
      log("done", `sign median=${wcS.median.toFixed(3)}ms  verify median=${wcV.median.toFixed(3)}ms`, "wc");

      // ── ratio bars ──
      if (wasmReady) {
        const maxS = Math.max(tsS.median, (window._wasmS||{median:0}).median ?? 0, wcS.median, tsS.median);
        const allSm = [tsS.median, wasmReady ? stats([]).median || tsS.median : tsS.median, wcS.median];

        const maxSign = Math.max(tsS.median, wcS.median);
        const maxVerify = Math.max(tsV.median, wcV.median);

        // re-compute with wasm values
        const _wasmS = stats(wasmSignT ?? [0]);
        const _wasmV = stats(wasmVerifyT ?? [0]);
        const mxS = Math.max(tsS.median, _wasmS.median, wcS.median);
        const mxV = Math.max(tsV.median, _wasmV.median, wcV.median);

        document.getElementById("rb-ts-s").style.width = (tsS.median / mxS * 100) + "%";
        document.getElementById("rb-wasm-s").style.width = (_wasmS.median / mxS * 100) + "%";
        document.getElementById("rb-wc-s").style.width = (wcS.median / mxS * 100) + "%";
        document.getElementById("rn-ts-s").textContent = tsS.median.toFixed(3) + "ms";
        document.getElementById("rn-wasm-s").textContent = _wasmS.median.toFixed(3) + "ms";
        document.getElementById("rn-wc-s").textContent = wcS.median.toFixed(3) + "ms";

        document.getElementById("rb-ts-v").style.width = (tsV.median / mxV * 100) + "%";
        document.getElementById("rb-wasm-v").style.width = (_wasmV.median / mxV * 100) + "%";
        document.getElementById("rb-wc-v").style.width = (wcV.median / mxV * 100) + "%";
        document.getElementById("rn-ts-v").textContent = tsV.median.toFixed(3) + "ms";
        document.getElementById("rn-wasm-v").textContent = _wasmV.median.toFixed(3) + "ms";
        document.getElementById("rn-wc-v").textContent = wcV.median.toFixed(3) + "ms";

        document.getElementById("ratio-bar").style.display = "block";

        const fasterSign = Math.min(tsS.median, _wasmS.median, wcS.median);
        log("summary", `sign 最速: ${fasterSign === wcS.median ? "WebCrypto" : fasterSign === _wasmS.median ? "Go wasm" : "自作TS"}  wasm/WebCrypto=${(_wasmS.median/wcS.median).toFixed(1)}倍`, "sys");
      }

      runBtn.disabled = false;
    });
  </script>
</body>
</html>
